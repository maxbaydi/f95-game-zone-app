name: Atlas Checks

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  check:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        shell: pwsh

      - name: Build CSS
        run: npm run build:css
        shell: pwsh

      - name: Lint
        run: npm run lint
        shell: pwsh

      - name: Typecheck
        run: npm run typecheck
        shell: pwsh

      - name: Test
        run: npm run test
        shell: pwsh
